{% extends 'base.html' %}

{% block title %}My Orders{% endblock %}

{% block content %}
  <h1>My Orders</h1>
  <p>Welcome to your orders page!</p>
  {% for i in orders %}
    <div style="border: 1px solid black; padding: 20px; margin: 20px;">
      <p><strong>Product:</strong> {{ i.PRODUCT.name }}</p>
      <p><strong>Price:</strong> ${{ i.price }}</p>
      <p><strong>Quantity:</strong> {{ i.quantity }}</p>
      <p><strong>Status:</strong> {{ i.order_status }}</p>
    </div>
  {% endfor %}
{% endblock %}
