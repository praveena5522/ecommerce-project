{% extends 'base.html' %}


{% block content %}


    <form action="" method="post" style="text-align: center; color: rgb(4, 4, 166); font-size: 20px; font-family: 'Courier New', Courier, monospace; margin-top: 50px; padding: 20px; border-radius: 5px; background-color: rgb(255, 255, 255); box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);">
        {% csrf_token %}
        <p style="color: red;">{{ error }}</p>
        <label for="firstname">First Name:</label>
        <input type="text" name="firstname"><br>
        <label for="lastname">Last Name:</label>
        <input type="text" name="lastname"><br>
        <label for="email">Email:</label>
        <input type="email" name="email"><br>
        <label for="username">Username:</label>
        <input type="text" name="username"><br>
        <label for="password">Password:</label>
        <input type="password" name="password"><br>
        <label for="confirm_password">Confirm Password:</label>
        <input type="password" name="confirm_password"><br>
        <input type="submit" value="Register">
    </form>
{% endblock %}
